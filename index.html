<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电商AI工具 · 交互演示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#1d2129;height:100vh;overflow:hidden}

.topbar{height:48px;background:#fff;border-bottom:1px solid #e5e6eb;display:flex;align-items:center;padding:0 20px;gap:12px}
.topbar-logo{width:28px;height:28px;background:linear-gradient(135deg,#e4393c,#ff6b6e);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700}
.topbar-title{font-size:14px;font-weight:600;color:#1d2129}
.topbar-divider{width:1px;height:20px;background:#e5e6eb}
.topbar-skill{font-size:12px;color:#86909c;background:#f2f3f5;padding:2px 10px;border-radius:4px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:16px}
.topbar-btn{font-size:12px;color:#86909c;cursor:pointer;padding:4px 8px;border-radius:4px;border:none;background:none}
.topbar-btn:hover{background:#f2f3f5}
.topbar-avatar{width:28px;height:28px;border-radius:50%;background:#e8f3ff;display:flex;align-items:center;justify-content:center;font-size:12px;color:#165dff;font-weight:600}

.main{display:flex;height:calc(100vh - 48px)}

.chat-panel{width:46%;min-width:420px;display:flex;flex-direction:column;background:#fff;border-right:1px solid #e5e6eb}
.chat-header{padding:16px 20px 12px;border-bottom:1px solid #f2f3f5}
.chat-header h2{font-size:15px;font-weight:600;color:#1d2129}
.chat-header p{font-size:12px;color:#86909c;margin-top:2px}
.chat-body{flex:1;overflow-y:auto;padding:16px 20px;scroll-behavior:smooth}
.chat-body::-webkit-scrollbar{width:4px}
.chat-body::-webkit-scrollbar-thumb{background:#c9cdd4;border-radius:2px}

.msg{margin-bottom:16px;display:flex;gap:10px;animation:msgIn .35s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
.msg.ai .msg-avatar{background:linear-gradient(135deg,#e4393c,#ff6b6e);color:#fff}
.msg.user .msg-avatar{background:#e8f3ff;color:#165dff}
.msg-bubble{max-width:85%;border-radius:12px;padding:12px 16px;font-size:13px;line-height:1.7}
.msg.ai .msg-bubble{background:#f7f8fa;color:#1d2129;border-top-left-radius:4px}
.msg.user .msg-bubble{background:#165dff;color:#fff;border-top-right-radius:4px}
.msg-bubble strong{font-weight:600}

.typing-indicator{display:inline-flex;gap:4px;padding:4px 0}
.typing-indicator span{width:6px;height:6px;border-radius:50%;background:#c9cdd4;animation:bounce .6s infinite alternate}
.typing-indicator span:nth-child(2){animation-delay:.15s}
.typing-indicator span:nth-child(3){animation-delay:.3s}
@keyframes bounce{to{transform:translateY(-6px);opacity:1}}

.option-list{margin:10px 0 4px;display:flex;flex-direction:column;gap:6px}
.option-item{background:#fff;border:1px solid #e5e6eb;border-radius:8px;padding:8px 12px;font-size:13px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:all .15s}
.option-item:hover{border-color:#165dff;background:#f0f5ff;transform:translateX(2px)}
.option-item.disabled{pointer-events:none;opacity:.5}
.option-item .opt-key{font-size:11px;font-weight:700;color:#165dff;background:#e8f3ff;padding:1px 6px;border-radius:3px;flex-shrink:0}
.option-item .opt-label{font-weight:500;color:#1d2129}
.option-item .opt-desc{font-size:12px;color:#86909c;margin-left:auto}

.msg-table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px}
.msg-table th{background:#f2f3f5;color:#4e5969;font-weight:600;padding:6px 10px;text-align:left;border-bottom:1px solid #e5e6eb}
.msg-table td{padding:6px 10px;border-bottom:1px solid #f2f3f5;color:#1d2129;cursor:pointer;transition:background .15s}
.msg-table tr.clickable-row:hover td{background:#f0f5ff}
.msg-table tr.disabled-row{pointer-events:none;opacity:.5}

.summary-card{background:#fff;border:1px solid #e5e6eb;border-radius:10px;padding:12px 16px;margin:8px 0}
.summary-title{font-size:14px;font-weight:600;color:#1d2129;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.summary-stats{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.stat-chip{font-size:12px;padding:3px 10px;border-radius:12px;font-weight:500}
.stat-chip.up{background:#e8ffea;color:#00893e}
.stat-chip.down{background:#ffece8;color:#f53f3f}
.stat-chip.flat{background:#e8f3ff;color:#165dff}
.stat-chip.new{background:#fff7e8;color:#d46b08}
.stat-chip.out{background:#f2f3f5;color:#86909c}
.summary-highlight{font-size:12px;color:#4e5969;line-height:1.6}

.result-table-wrap{background:#fff;border:1px solid #e5e6eb;border-radius:10px;overflow:hidden;margin:8px 0}
.result-table-header{padding:8px 14px;font-size:13px;font-weight:600;color:#1d2129;border-bottom:1px solid #e5e6eb;display:flex;align-items:center;justify-content:space-between}
.result-table-header span{font-size:11px;color:#86909c;font-weight:400}
.result-table{width:100%;border-collapse:collapse;font-size:12px}
.result-table th{background:#fafafa;color:#86909c;font-weight:500;padding:6px 10px;text-align:left;border-bottom:1px solid #e5e6eb;white-space:nowrap}
.result-table td{padding:6px 10px;border-bottom:1px solid #f7f8fa;white-space:nowrap}
.result-table tr:last-child td{border-bottom:none}
.result-table .rank-num{font-weight:700;color:#1d2129}
.change-up{color:#00893e;font-weight:600}
.change-down{color:#f53f3f;font-weight:600}
.change-flat{color:#165dff;font-weight:500}
.change-new{color:#d46b08;font-weight:600}
.result-table .more-row td{text-align:center;color:#165dff;font-size:12px;padding:8px;cursor:pointer}
.result-table .more-row:hover td{background:#f0f5ff}

.file-card{background:#fff;border:1px solid #e5e6eb;border-radius:10px;padding:12px 16px;margin:8px 0;display:flex;align-items:center;gap:12px}
.file-icon{width:40px;height:40px;border-radius:8px;background:#e8ffea;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.file-info{flex:1}
.file-name{font-size:13px;font-weight:600;color:#1d2129}
.file-meta{font-size:11px;color:#86909c;margin-top:2px}
.file-action{font-size:12px;color:#165dff;font-weight:500;cursor:pointer;padding:4px 12px;border:1px solid #165dff;border-radius:6px;background:none;white-space:nowrap;transition:all .15s}
.file-action:hover{background:#165dff;color:#fff}

.next-steps{margin:8px 0;display:flex;flex-direction:column;gap:4px}
.next-step-item{font-size:12px;color:#4e5969;padding:6px 10px;background:#f7f8fa;border-radius:6px;display:flex;align-items:center;gap:6px;cursor:pointer;transition:background .15s}
.next-step-item:hover{background:#e8f3ff}
.next-step-item .ns-num{font-size:11px;font-weight:700;color:#165dff}

.glossary-toggle{font-size:12px;color:#165dff;cursor:pointer;margin:6px 0 2px;display:inline-flex;align-items:center;gap:4px}
.glossary-toggle:hover{text-decoration:underline}
.glossary-block{background:#f7f8fa;border-radius:8px;padding:10px 14px;margin:4px 0;font-size:12px;display:none}
.glossary-block.show{display:block}
.glossary-block table{width:100%;border-collapse:collapse}
.glossary-block td{padding:3px 0;vertical-align:top}
.glossary-block td:first-child{font-weight:600;color:#1d2129;width:72px;white-space:nowrap}
.glossary-block td:last-child{color:#4e5969}

.chat-input{padding:12px 20px;border-top:1px solid #e5e6eb;display:flex;align-items:center;gap:10px;background:#fff}
.chat-input-box{flex:1;height:38px;border:1px solid #e5e6eb;border-radius:8px;padding:0 14px;font-size:13px;display:flex;align-items:center;background:#f7f8fa;transition:border-color .15s}
.chat-input-box:focus-within{border-color:#165dff;background:#fff}
.chat-input-box input{flex:1;border:none;outline:none;background:transparent;font-size:13px;color:#1d2129}
.chat-input-box input::placeholder{color:#c9cdd4}
.chat-send-btn{width:38px;height:38px;border-radius:8px;background:#165dff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .15s}
.chat-send-btn:hover{opacity:.85}
.chat-send-btn svg{width:18px;height:18px;fill:#fff}

.quick-actions{padding:8px 20px;border-top:1px solid #f2f3f5;background:#fafafa;display:flex;gap:6px;flex-wrap:wrap}
.quick-action{font-size:12px;color:#4e5969;padding:4px 12px;border-radius:14px;border:1px solid #e5e6eb;background:#fff;cursor:pointer;transition:all .15s;white-space:nowrap}
.quick-action:hover{border-color:#165dff;color:#165dff;background:#f0f5ff}

.side-panel{flex:1;display:flex;flex-direction:column;background:#fafafa;position:relative}
.side-header{padding:12px 20px;border-bottom:1px solid #e5e6eb;background:#fff;display:flex;align-items:center;gap:10px}
.side-tabs{display:flex;gap:0}
.side-tab{font-size:13px;padding:6px 16px;color:#86909c;cursor:pointer;border-bottom:2px solid transparent;font-weight:500;transition:all .15s}
.side-tab.active{color:#e4393c;border-bottom-color:#e4393c;font-weight:600}
.side-actions{margin-left:auto;display:flex;gap:8px}
.side-action-btn{font-size:12px;color:#4e5969;padding:4px 10px;border-radius:6px;border:1px solid #e5e6eb;background:#fff;cursor:pointer;display:flex;align-items:center;gap:4px;transition:background .15s}
.side-action-btn:hover{background:#f2f3f5}

.side-toolbar{padding:8px 20px;border-bottom:1px solid #e5e6eb;background:#fff;display:none;align-items:center;gap:8px}
.side-toolbar.visible{display:flex}
.toolbar-search{flex:1;max-width:240px;height:30px;border:1px solid #e5e6eb;border-radius:6px;padding:0 10px;font-size:12px;display:flex;align-items:center;gap:6px;background:#f7f8fa}
.toolbar-search input{flex:1;border:none;outline:none;background:transparent;font-size:12px;color:#1d2129}
.toolbar-search input::placeholder{color:#c9cdd4}
.toolbar-filter{font-size:12px;color:#4e5969;padding:4px 10px;border-radius:6px;border:1px solid #e5e6eb;background:#fff;cursor:pointer;transition:all .15s}
.toolbar-filter:hover{border-color:#e4393c}
.toolbar-filter.active{border-color:#e4393c;color:#e4393c;background:#fff5f5}

.side-placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#c9cdd4;gap:12px}
.side-placeholder svg{width:64px;height:64px;opacity:.4}
.side-placeholder p{font-size:13px}

.side-table-wrap{flex:1;overflow:auto;padding:0;display:none}
.side-table-wrap.visible{display:block}
.side-table-wrap::-webkit-scrollbar{width:6px;height:6px}
.side-table-wrap::-webkit-scrollbar-thumb{background:#c9cdd4;border-radius:3px}
.side-table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px}
.side-table thead th{background:#f7f8fa;color:#86909c;font-weight:600;padding:8px 12px;text-align:left;border-bottom:1px solid #e5e6eb;position:sticky;top:0;z-index:1;white-space:nowrap}
.side-table tbody td{padding:8px 12px;border-bottom:1px solid #f2f3f5;white-space:nowrap}
.side-table tbody tr{transition:background .1s}
.side-table tbody tr:hover{background:#f7f8fa}
.side-table .col-rank{font-weight:700;text-align:center;width:50px}
.side-table .col-kw{font-weight:500;color:#1d2129;min-width:120px}
.side-table .col-num{text-align:right;font-variant-numeric:tabular-nums}
.side-table .col-change{font-weight:600;text-align:center;min-width:110px}
.tag-up{display:inline-block;background:#e8ffea;color:#00893e;padding:1px 8px;border-radius:4px;font-size:11px}
.tag-down{display:inline-block;background:#ffece8;color:#f53f3f;padding:1px 8px;border-radius:4px;font-size:11px}
.tag-flat{display:inline-block;background:#e8f3ff;color:#165dff;padding:1px 8px;border-radius:4px;font-size:11px}
.tag-new{display:inline-block;background:#fff7e8;color:#d46b08;padding:1px 8px;border-radius:4px;font-size:11px}

.sheet-tabs{padding:8px 20px;border-top:1px solid #e5e6eb;background:#fff;display:none;align-items:center;gap:0}
.sheet-tabs.visible{display:flex}
.sheet-tab{font-size:12px;padding:5px 16px;cursor:pointer;color:#86909c;border:1px solid #e5e6eb;background:#f7f8fa;font-weight:500;transition:all .15s}
.sheet-tab:first-child{border-radius:6px 0 0 6px}
.sheet-tab:last-child{border-radius:0 6px 6px 0}
.sheet-tab.active{background:#fff;color:#e4393c;border-color:#e4393c;font-weight:600;z-index:1;position:relative}
.sheet-info{margin-left:auto;font-size:11px;color:#c9cdd4}

.loading-overlay{position:absolute;inset:0;background:rgba(255,255,255,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;opacity:0;pointer-events:none;transition:opacity .3s;gap:12px}
.loading-overlay.active{opacity:1;pointer-events:auto}
.loading-spinner{width:32px;height:32px;border:3px solid #e5e6eb;border-top-color:#e4393c;border-radius:50%;animation:spin .8s linear infinite}
.loading-text{font-size:13px;color:#86909c}
@keyframes spin{to{transform:rotate(360deg)}}

/* Category Filter Component */
.cat-filter{background:#fff;border:1px solid #e5e6eb;border-radius:10px;overflow:hidden;margin:10px 0 4px;font-size:12px}
.cat-filter-head{display:flex;align-items:center;border-bottom:1px solid #e5e6eb;background:#fafafa}
.cat-filter-tab{padding:7px 16px;font-size:12px;font-weight:600;color:#1d2129;border-bottom:2px solid #e4393c;background:#fff;cursor:default}
.cat-filter-tab.inactive{color:#86909c;font-weight:400;border-bottom-color:transparent;background:transparent}
.cat-filter-search{margin-left:auto;padding:6px 12px;display:flex;align-items:center;gap:6px}
.cat-filter-search input{width:120px;height:26px;border:1px solid #e5e6eb;border-radius:4px;padding:0 8px;font-size:12px;color:#1d2129;outline:none;background:#f7f8fa}
.cat-filter-search input:focus{border-color:#165dff;background:#fff}
.cat-filter-search input::placeholder{color:#c9cdd4}
.cat-filter-body{display:flex;min-height:180px;max-height:240px}
.cat-col{flex:1;border-right:1px solid #f2f3f5;overflow-y:auto;padding:4px 0}
.cat-col:last-child{border-right:none}
.cat-col::-webkit-scrollbar{width:3px}
.cat-col::-webkit-scrollbar-thumb{background:#e5e6eb;border-radius:2px}
.cat-col-label{font-size:10px;color:#86909c;padding:4px 12px 2px;font-weight:600;letter-spacing:.5px}
.cat-item{display:flex;align-items:center;padding:5px 12px;cursor:pointer;transition:background .1s;gap:6px;position:relative}
.cat-item:hover{background:#f7f8fa}
.cat-item.active{background:#fff5f5;color:#e4393c}
.cat-item.active .cat-check{border-color:#e4393c;background:#e4393c}
.cat-item.active .cat-check::after{content:'✓';color:#fff;font-size:9px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.cat-check{width:14px;height:14px;border:1.5px solid #c9cdd4;border-radius:3px;flex-shrink:0;position:relative;transition:all .15s}
.cat-name{flex:1;font-size:12px;color:#1d2129;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-item.active .cat-name{color:#e4393c;font-weight:600}
.cat-arrow{font-size:10px;color:#c9cdd4;flex-shrink:0}
.cat-item.active .cat-arrow{color:#e4393c}
.cat-confirm-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-top:1px solid #e5e6eb;background:#fafafa}
.cat-path{font-size:11px;color:#86909c}
.cat-path strong{color:#e4393c;font-weight:600}
.cat-confirm-btn{font-size:12px;color:#fff;background:#e4393c;border:none;padding:4px 16px;border-radius:6px;cursor:pointer;font-weight:500;transition:opacity .15s}
.cat-confirm-btn:hover{opacity:.85}
.cat-confirm-btn:disabled{background:#c9cdd4;cursor:not-allowed}

/* Drill-down card */
.drill-card{background:#fff;border:1px solid #e5e6eb;border-radius:10px;padding:12px 16px;margin:8px 0}
.drill-title{font-size:14px;font-weight:600;color:#1d2129;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.drill-list{display:flex;flex-direction:column;gap:4px}
.drill-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#f7f8fa;border-radius:6px;font-size:12px}
.drill-rank{font-size:11px;font-weight:700;color:#fff;background:#00893e;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.drill-name{font-weight:600;color:#1d2129;min-width:80px}
.drill-change{font-size:12px;font-weight:600;color:#00893e}
.drill-meta{font-size:11px;color:#86909c;margin-left:auto}

/* Chart */
.chart-wrap{background:#fff;border:1px solid #e5e6eb;border-radius:10px;padding:16px;margin:8px 0}
.chart-title{font-size:14px;font-weight:600;color:#1d2129;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.chart-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:11px}
.chart-label{width:72px;text-align:right;color:#4e5969;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.chart-bar-bg{flex:1;height:20px;background:#f2f3f5;border-radius:4px;overflow:hidden;position:relative}
.chart-bar-fill{height:100%;border-radius:4px;transition:width .6s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:10px;font-weight:600;color:#fff;min-width:24px}
.chart-bar-fill.up{background:linear-gradient(90deg,#52c41a,#00893e)}
.chart-bar-fill.down{background:linear-gradient(90deg,#ff7875,#f53f3f)}
.chart-bar-fill.new{background:linear-gradient(90deg,#ffa940,#d46b08)}
.chart-val{font-size:10px;color:#86909c;width:60px;flex-shrink:0;text-align:right}

/* Attribution */
.attr-card{background:#fff;border:1px solid #e5e6eb;border-radius:10px;padding:14px 16px;margin:8px 0}
.attr-title{font-size:14px;font-weight:600;color:#1d2129;margin-bottom:4px}
.attr-sub{font-size:12px;color:#86909c;margin-bottom:10px}
.attr-kpi{display:flex;gap:8px;margin-bottom:10px}
.attr-kpi-item{flex:1;background:#f7f8fa;border-radius:8px;padding:8px 10px;text-align:center}
.attr-kpi-label{font-size:10px;color:#86909c;margin-bottom:2px}
.attr-kpi-val{font-size:16px;font-weight:700;color:#1d2129}
.attr-kpi-val.red{color:#f53f3f}
.attr-kpi-val.green{color:#00893e}
.attr-section{font-size:13px;font-weight:600;color:#1d2129;margin:10px 0 6px;padding-top:8px;border-top:1px solid #f2f3f5}
.attr-reason{font-size:12px;color:#4e5969;line-height:1.7;padding-left:10px;border-left:3px solid #e5e6eb;margin:6px 0}
.attr-compare{margin:8px 0}
.attr-compare-row{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12px;border-bottom:1px solid #f7f8fa}
.attr-compare-row:last-child{border-bottom:none}
.attr-cmp-name{width:80px;font-weight:500;color:#1d2129}
.attr-cmp-bar{flex:1;height:14px;background:#f2f3f5;border-radius:3px;overflow:hidden}
.attr-cmp-fill{height:100%;border-radius:3px}
.attr-cmp-val{width:50px;text-align:right;font-size:11px;color:#86909c}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Q</div>
  <div class="topbar-title">QoderWork</div>
  <div class="topbar-divider"></div>
  <div class="topbar-skill">jd-osw-keyword-rank-comparison</div>
  <div class="topbar-right">
    <button class="topbar-btn">技能市场</button>
    <button class="topbar-btn">设置</button>
    <div class="topbar-avatar">张</div>
  </div>
</div>

<div class="main">
  <div class="chat-panel">
    <div class="chat-header">
      <h2>搜索热词排名对比分析</h2>
      <p>对比上周与上上周的行业搜索热词排行榜变化</p>
    </div>
    <div class="chat-body" id="chatBody"></div>
    <div class="chat-input">
      <div class="chat-input-box">
        <input type="text" id="chatInput" placeholder="输入你想分析的内容…" onkeydown="if(event.key==='Enter')sendUserInput()">
      </div>
      <button class="chat-send-btn" onclick="sendUserInput()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>

// ====== Route: decide which stage to go based on user input ======
function routeInput(text){
  const t=text.toLowerCase();
  // Contains specific category name → go to category filter with pre-select
  if(/手机|电脑|家电|数码|空调|冰箱|洗衣|电视|耳机|相机/.test(t)) return 'category';
  // Contains keyword-search intent → go to keyword mode
  if(/包含|关键词|含有/.test(t)) return 'keyword';
  // Very vague → show capabilities + options
  if(/看看|分析|变化|热词|排名/.test(t) && !/全部|所有|整个/.test(t)) return 'vague';
  // Explicitly says "all" → go directly to query
  if(/全部|所有|整个/.test(t)) return 'all';
  return 'vague';
}

    return`<tr><td class="col-rank">${k.r}</td><td class="col-kw">${k.k}</td><td class="col-rank">${k.lr}</td><td class="col-rank">${pr}</td><td class="col-change">${tag}</td><td class="col-num">${k.uv}</td><td class="col-num">${k.ex}</td><td class="col-num">${k.ct}</td><td class="col-num">${k.bl}</td></tr>`;

}

function followChart(){
  if(busy)return; busy=true;
  addMsg('user','把这些数据做成图表',()=>typing(()=>{
    const top15=KW.slice(0,15);
    const maxD=Math.max(...top15.map(k=>k.d||1));
    const bars=top15.map(k=>{
      const pct=Math.max(Math.abs(k.d)/maxD*100,8);
      let cls=k.ch==='up'?'up':k.ch==='down'?'down':'new';
      let label=k.ch==='up'?`+${k.d}`:k.ch==='down'?`-${k.d}`:k.ch==='new'?'NEW':'0';
      return`<div class="chart-bar-row">
<div class="chart-label">${k.k}</div>
<div class="chart-bar-bg"><div class="chart-bar-fill ${cls}" style="width:${pct}%">${label}</div></div>
<div class="chart-val">排名 ${k.lr}</div>
</div>`;
    }).join('');

    addMsg('ai',`
<div class="chart-wrap">
<div class="chart-title">📊 Top15 热词排名变化柱状图</div>
<div style="font-size:11px;color:#86909c;margin-bottom:10px">柱状图展示排名变化幅度，<span style="color:#00893e">绿色=上升</span> <span style="color:#f53f3f">红色=下降</span> <span style="color:#d46b08">橙色=新上榜</span></div>
